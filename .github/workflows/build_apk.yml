name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      - name: Install packages
        working-directory: AlghraibiERP-Flutter-main
        run: flutter pub get

      - name: Build APK
        working-directory: AlghraibiERP-Flutter-main
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlghraibiERP-apk
          path: AlghraibiERP-Flutter-main/build/app/outputs/flutter-apk/app-release.apk
